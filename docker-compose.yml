services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://plx:${DB_PASSWORD}@db:5432/pineapplelootxpress
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_URL: ${AUTH_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NEXT_PUBLIC_GUILD_NAME: ${NEXT_PUBLIC_GUILD_NAME:-Pineapple Express}
      NEXT_PUBLIC_GUILD_REALM: ${NEXT_PUBLIC_GUILD_REALM:-Galakrond}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pineapplelootxpress
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Only expose DB port locally — not to the outside world
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plx -d pineapplelootxpress"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    driver: local
